<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Για τον [Όνομα Φίλου]</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comfortaa', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('friends.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: rgba(30, 30, 30, 0.95);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 2px solid #cfb53b;
            max-width: 450px;
            width: 85%;
            text-align: center;
            z-index: 10;
        }
        h1 { font-size: 2.2rem; color: #cfb53b; margin-top: 0; }
        p { line-height: 1.6; }
        .btn-container { 
            margin-top: 2.5rem; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            min-height: 60px;
        }
        .btn {
            background-color: #cfb53b;
            color: #1a1a1a;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }
        .btn:hover { transform: scale(1.05); }
        
        /* Το "άπιαστο" κουμπί */
        #no-btn {
    		background-color: #e74c3c;
    		color: white;
    		position: fixed; 
    		transition: all 0.15s ease-out;
    		z-index: 1000;
    		box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4); /* Κόκκινη σκιά για να "χτυπάει" στο μάτι */
	}

        #countdown {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: #cfb53b;
            letter-spacing: 1px;
            border-top: 1px solid #444;
            padding-top: 1.5rem;
        }
        #question-area { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="intro-area">
            <h1>Αδερφέ μου!</h1>
            <p>Έχουμε περάσει πολλά, αλλά αυτό που έρχεται δεν το γλιτώνουμε...</p>
            <button class="btn" onclick="reveal()">Δες τι εννοώ</button>
        </div>

        <div id="question-area">
            <h1>Παντρεύομαι! 🤵‍♂️</h1>
            <p>22 Μαΐου 2027. Σημείωσε την ημερομηνία.</p>
            <h2 style="color: #fff;">Θα γίνεις ο Κουμπάρος μου;</h2>
            
            <div class="btn-container">
                <button class="btn" onclick="celebrate()">ΕΝΝΟΕΙΤΑΙ!</button>
                <button class="btn" id="no-btn" onmouseover="moveButton()">ΟΧΙ</button>
            </div>

            <div id="countdown">
                Η αντίστροφη μέτρηση άρχισε: <br>
                <b id="timer" style="font-size: 1.1rem;">...</b>
            </div>
        </div>
    </div>

    <script>
        function reveal() {
            document.getElementById('intro-area').style.display = 'none';
            document.getElementById('question-area').style.display = 'block';
            startTimer();
        }

        // Αντίστροφη Μέτρηση για 22 Μαΐου 2027
        function startTimer() {
            const weddingDate = new Date("May 22, 2027 19:00:00").getTime();
            
            const x = setInterval(function() {
                const now = new Date().getTime();
                const diff = weddingDate - now;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

                document.getElementById("timer").innerHTML = days + " μέρες, " + hours + " ώρες και " + mins + " λεπτά";

                if (diff < 0) {
                    clearInterval(x);
                    document.getElementById("timer").innerHTML = "Η ΩΡΑ Η ΚΑΛΗ!";
                }
            }, 1000);
        }

        // Το κουμπί που "κυνηγάει"
        function moveButton() {
            const btn = document.getElementById('no-btn');
            
            // Υπολογισμός τυχαίας θέσης εντός των ορίων του παραθύρου
            const maxX = window.innerWidth - btn.clientWidth - 50;
            const maxY = window.innerHeight - btn.clientHeight - 50;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function celebrate() {
            alert("ΕΤΣΙ ΣΕ ΘΕΛΩ! 🍻 \n\nΕτοιμάσου, έχουμε να οργανώσουμε το καλύτερο bachelor στην ιστορία!");
        }
    </script>
</body>
</html>
